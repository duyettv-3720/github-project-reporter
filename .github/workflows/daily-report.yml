name: Daily Project Report

on:
  workflow_dispatch: {} # allow manual "Run workflow" for testing
  schedule:
    # 14:55 GMT+7 (07:55 UTC) daily. GitHub cron is best-effort and may be
    # delayed a few minutes; that's fine for a once-a-day report.
    - cron: "55 7 * * *"

# Avoid overlapping runs if a previous one is still going.
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Send report to Slack
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm run report
