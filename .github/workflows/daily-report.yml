name: Daily Project Report

on:
  # Triggered on demand and by an external scheduler (e.g. cron-job.org) calling
  # the workflow_dispatch REST API at the desired time. GitHub's own `schedule`
  # trigger is intentionally not used because it is unreliable / delayed.
  workflow_dispatch: {}

# Avoid overlapping runs if a previous one is still going.
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Send report to Slack
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PROJECT_ID_B: ${{ secrets.PROJECT_ID_B }}
          SLACK_WEBHOOK_URL_B: ${{ secrets.SLACK_WEBHOOK_URL_B }}
        run: npm run report
