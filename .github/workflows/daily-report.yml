name: Daily Project Report

on:
  # Manual runs and external schedulers (e.g. cron-job.org) via the dispatch API.
  workflow_dispatch: {}
  schedule:
    # 20:00 GMT+7 (13:00 UTC) daily. GitHub cron is best-effort and may be
    # delayed a few minutes; that's fine for a once-a-day report.
    - cron: "0 13 * * *"

# Avoid overlapping runs if a previous one is still going.
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Send report to Slack
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PROJECT_ID_B: ${{ secrets.PROJECT_ID_B }}
          SLACK_WEBHOOK_URL_B: ${{ secrets.SLACK_WEBHOOK_URL_B }}
        run: npm run report
